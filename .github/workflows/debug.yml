name: Diagnostic Remote

on:
  push:
    branches:
      - main

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Check SSH Environment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            echo "<html><body><pre>" > public_html/debug.html
            echo "--- Current Directory ---" >> public_html/debug.html
            pwd >> public_html/debug.html
            echo "\n--- Searching for 'cuentacuentos' folder ---" >> public_html/debug.html
            find $HOME -name "cuentacuentos" -type d >> public_html/debug.html 2>/dev/null
            echo "\n--- domains Listing ---" >> public_html/debug.html
            ls -R domains >> public_html/debug.html 2>/dev/null
            echo "</pre></body></html>" >> public_html/debug.html
            chmod 644 public_html/debug.html
