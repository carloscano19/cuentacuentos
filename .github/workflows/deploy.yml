name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v3

      - name: 📁 Crear directorio si no existe
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            mkdir -p domains/carloscanofernandez.com/public_html/cuentacuentos
            cd domains/carloscanofernandez.com/public_html/cuentacuentos
            # Limpiamos archivos antiguos para evitar conflictos con la nueva estructura
            find . -maxdepth 1 ! -name 'www' ! -name '.' -exec rm -rf {} +
            rm -rf www/ 
            rm -f ../debug.html

      - name: 🚀 Desplegar a Hostinger
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          source: "www/*,server/*"
          target: "domains/carloscanofernandez.com/public_html/cuentacuentos"
          strip_components: 0
