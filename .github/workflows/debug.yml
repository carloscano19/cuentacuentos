name: Diagnostic Remote

on:
  push:
    branches:
      - main

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Check SSH Environment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            echo "--- Searching for 'cuentacuentos' folder ---"
            find $HOME -name "cuentacuentos" -type d 2>/dev/null
            echo "--- Web Root Check ---"
            [ -d "domains/carloscanofernandez.com/public_html" ] && echo "Found domains path" || echo "Domains path NOT found"
            [ -d "public_html" ] && echo "Found public_html in home" || echo "public_html NOT found in home"
